    <script>
      // Polyfill para ambientes onde crypto.randomUUID não existe.
      // (Algumas libs dependem disso durante a avaliação do módulo.)
      (function () {
        try {
          if (window.crypto && !window.crypto.randomUUID) {
            window.crypto.randomUUID = function () {
              var s = [];
              var hex = "0123456789abcdef";
              for (var i = 0; i < 36; i++) {
                s[i] = hex[Math.floor(Math.random() * 16)];
              }
              s[14] = "4";
              s[19] = hex[(parseInt(s[19], 16) & 0x3) | 0x8];
              s[8] = s[13] = s[18] = s[23] = "-";
              return s.join("");
            };
          }
        } catch (e) {}
      })();
    </script>
